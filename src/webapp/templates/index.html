<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD Accessibility - 3D Design Tool for BVI People</title>
    <!-- Add Three.js library -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Left panel - Code Editor */
        .code-editor-panel {
            width: 25%;
            background-color: #f8f9fa;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            background-color: #e9ecef;
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }
        
        .code-editor {
            height: 100%;
            padding: 10px;
            font-family: monospace;
            resize: none;
            border: none;
            background-color: #f8f9fa;
        }
        
        /* Center panel - 3D Model Viewer */
        .model-viewer-panel {
            width: 50%;
            background-color: #fff;
            position: relative;
        }
        
        .model-canvas {
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
        }
        
        /* Right panel - Generated Views */
        .views-panel {
            width: 25%;
            background-color: #f8f9fa;
            border-left: 1px solid #ddd;
            overflow-y: auto;
        }
        
        .view-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }
        
        .view-card {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            background-color: white;
        }
        
        .view-card h3 {
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .view-image {
            width: 100%;
            height: 150px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Bottom panel - Parameter Sliders */
        .parameters-panel {
            height: 120px;
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
            padding: 10px 20px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        
        .sliders-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px 30px;
        }
        
        .slider-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }
        
        .slider-label {
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .slider-value {
            font-size: 11px;
            color: #666;
            text-align: right;
        }
        
        /* Buttons */
        .action-button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .action-button:hover {
            background-color: #0069d9;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>cad-a11y</h1>
        <div>
            <button class="action-button">Generate Views</button>
            <button class="action-button">Export Model</button>
        </div>
    </div>
    
    <div class="main-container">
        <!-- Left Panel - JSCAD Code Editor -->
        <div class="code-editor-panel">
            <div class="panel-header">JSCAD Code Editor</div>
            <textarea class="code-editor" placeholder="// Write your JSCAD code here
const createModel = () => {
  const cylinder = cylinder({
    radius: 10,
    height: 30
  })
  return cylinder
}

return createModel()"></textarea>
        </div>
        
        <!-- Center Panel - 3D Model Viewer -->
        <div class="model-viewer-panel">
            <div class="panel-header">3D Model Preview</div>
            <div class="model-canvas">
                <!-- This is where the Three.js canvas would be rendered -->
                <div style="display: flex; height: 100%; align-items: center; justify-content: center; color: #999;">
                    3D model will be displayed here (Three.js + JSCAD)
                </div>
            </div>
        </div>
        
        <!-- Right Panel - Generated Views -->
        <div class="views-panel">
            <div class="panel-header">Generated Views</div>
            <div class="view-container">
                <div class="view-card">
                    <h3>Top View</h3>
                    <div class="view-image">Top view preview</div>
                </div>
                <div class="view-card">
                    <h3>Front View</h3>
                    <div class="view-image">Front view preview</div>
                </div>
                <div class="view-card">
                    <h3>Right View</h3>
                    <div class="view-image">Right view preview</div>
                </div>
                <div class="view-card">
                    <h3>Bottom View</h3>
                    <div class="view-image">Bottom view preview</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bottom Panel - Parameter Sliders -->
    <div class="parameters-panel">
        <div class="panel-header">View Parameters</div>
        <div class="sliders-container">
            <!-- 10 parameter sliders as requested -->
            <div class="slider-group">
                <label class="slider-label">Line Thickness</label>
                <input type="range" min="1" max="10" value="2" class="slider">
                <div class="slider-value">2px</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">Resolution</label>
                <input type="range" min="10" max="100" value="50" class="slider">
                <div class="slider-value">50%</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">Edge Visibility</label>
                <input type="range" min="0" max="100" value="80" class="slider">
                <div class="slider-value">80%</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">Hidden Lines</label>
                <input type="range" min="0" max="100" value="30" class="slider">
                <div class="slider-value">30%</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">Texture Density</label>
                <input type="range" min="0" max="100" value="50" class="slider">
                <div class="slider-value">50%</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">Surface Detail</label>
                <input type="range" min="1" max="10" value="5" class="slider">
                <div class="slider-value">5</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">Contrast</label>
                <input type="range" min="0" max="100" value="70" class="slider">
                <div class="slider-value">70%</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">Tactile Height</label>
                <input type="range" min="0" max="10" value="3" class="slider">
                <div class="slider-value">3mm</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">Braille Size</label>
                <input type="range" min="1" max="5" value="2" class="slider">
                <div class="slider-value">2</div>
            </div>
            <div class="slider-group">
                <label class="slider-label">View Spacing</label>
                <input type="range" min="0" max="50" value="20" class="slider">
                <div class="slider-value">20px</div>
            </div>
        </div>
    </div>
    
    <script>
        // This is just a placeholder for demonstration
        // In a real implementation, this would integrate with JSCAD and Three.js
        
        // Initialize Three.js scene
        let scene, camera, renderer, controls;
        let model;
        
        function initThreeJS() {
            // Get the container
            const container = document.querySelector('.model-canvas');
            
            // Clear any placeholder content
            container.innerHTML = '';
            
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);
            
            // Create camera
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            // Add orbit controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.25;
            
            // Add lights
            const ambientLight = new THREE.AmbientLight(0x404040, 1);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);
            
            // Add random 3D model
            addRandomModel();
            
            // Handle window resize
            window.addEventListener('resize', onWindowResize);
            
            // Start animation loop
            animate();
        }
        
        function addRandomModel() {
            // Generate a random model from several options
            const randomChoice = Math.floor(Math.random() * 4);
            
            switch(randomChoice) {
                case 0:
                    // Create a cube
                    const geometry = new THREE.BoxGeometry(2, 2, 2);
                    const material = new THREE.MeshStandardMaterial({ 
                        color: 0x3498db,
                        metalness: 0.2,
                        roughness: 0.5
                    });
                    model = new THREE.Mesh(geometry, material);
                    scene.add(model);
                    break;
                    
                case 1:
                    // Create a sphere
                    const sphereGeometry = new THREE.SphereGeometry(1.5, 32, 32);
                    const sphereMaterial = new THREE.MeshStandardMaterial({ 
                        color: 0xe74c3c,
                        metalness: 0.1,
                        roughness: 0.2
                    });
                    model = new THREE.Mesh(sphereGeometry, sphereMaterial);
                    scene.add(model);
                    break;
                    
                case 2:
                    // Create a torus knot
                    const torusGeometry = new THREE.TorusKnotGeometry(1, 0.3, 128, 16);
                    const torusMaterial = new THREE.MeshStandardMaterial({ 
                        color: 0x2ecc71,
                        metalness: 0.3,
                        roughness: 0.4
                    });
                    model = new THREE.Mesh(torusGeometry, torusMaterial);
                    scene.add(model);
                    break;
                    
                case 3:
                default:
                    // Create a complex shape (octahedron)
                    const octaGeometry = new THREE.OctahedronGeometry(1.5, 1);
                    const octaMaterial = new THREE.MeshStandardMaterial({ 
                        color: 0xf39c12,
                        metalness: 0.4,
                        roughness: 0.3,
                        flatShading: true
                    });
                    model = new THREE.Mesh(octaGeometry, octaMaterial);
                    scene.add(model);
                    break;
            }
            
            // Add wireframe
            const wireframe = new THREE.LineSegments(
                new THREE.WireframeGeometry(model.geometry),
                new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 })
            );
            model.add(wireframe);
        }
        
        function onWindowResize() {
            const container = document.querySelector('.model-canvas');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Just update controls and render
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Initialize 3D scene when page loads
        window.addEventListener('load', initThreeJS);
        
        // Update slider value displays
        document.querySelectorAll('.slider').forEach(slider => {
            slider.addEventListener('input', function() {
                const unit = this.parentElement.querySelector('.slider-value').textContent.replace(/[0-9.]+/g, '');
                this.parentElement.querySelector('.slider-value').textContent = this.value + unit;
            });
        });
        
        // Add event listener to Generate Views button
        document.querySelector('.action-button').addEventListener('click', function() {
            // This would connect to the JSCAD code and generate the views
            console.log('Generating views...');
            // In a real implementation, this would update the view cards
        });
    </script>
</body>
</html>
