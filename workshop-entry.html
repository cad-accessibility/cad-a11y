<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open your model — Accessible 3D Viewer</title>
    <meta name="description" content="Enter your first name to open your 3D model in the accessible viewer.">
    <link rel="stylesheet" href="/static/css/viewer.css?v=20260529-7">
</head>
<body class="workshop-entry">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="container">
        <header role="banner">
            <h1 id="page-title" tabindex="-1">Open your model</h1>
        </header>
        <main id="main-content">
            <!--NOTICE-->
            <form method="get" action="/workshop" class="section" aria-labelledby="name-heading">
                <h2 id="name-heading">Enter your first name</h2>
                <p class="help-text" id="name-help">
                    Type your first name, the same one on your name tag. Capital letters
                    and spaces do not matter.
                </p>
                <div class="field">
                    <label for="name">Your first name</label>
                    <input type="text" id="name" name="name" autocomplete="given-name"
                           autocapitalize="words" autocorrect="off" spellcheck="false"
                           required aria-describedby="name-help">
                </div>
                <div class="button-group">
                    <button type="submit">Open my model</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
