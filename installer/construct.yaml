name: CAD-A11y
version: 0.1.0
company: CAD-A11y
channels:
  - conda-forge
specs:
  - python=3.10
  - pip
  - flask>=2.3
  - flask-cors>=4.0
  - numpy>=1.21
  - pillow>=9.0
  - matplotlib>=3.5
  - pythonocc-core
  - trimesh>=3.20
  - shapely>=2.0
  - svgwrite
  - hidapi>=0.14
  - pyserial>=3.5
  - bleak>=0.22
  - meshlib
  - scipy
  - networkx
  - polyscope
  - opencv
  - pypdf2
  - reportlab
  - requests>=2.28
initialize_by_default: false
register_python_default: false
write_condarc: true
installer_type: exe
post_install: post_install.bat
extra_files:
  - ../accessible-3d-viewer.html
  - ../server_cube_slider.py
  - ../server.py
  - ../braille_display.py
  - ../cad_comparison_lib.py
  - ../requirements.txt
  - ../README.md
  - ../model
  - ../src
  - launch_cad_a11y.bat
