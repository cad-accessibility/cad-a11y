services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8635}:6969"
    env_file:
      - path: .env
        required: false
    environment:
      SERVER_VERBOSE: "${SERVER_VERBOSE:-0}"
    volumes:
      # DATA_DIR should point to the persistent host path for each environment.
      # Local dev default:  DATA_DIR=./data  (relative to this file)
      # Hosted server:      DATA_DIR=/projects/<lab-share>/<subdir>
      # The four subdirs (models, renders, logs, db) must exist on the host and
      # be writable by UID 48 (apache).
      - ${DATA_DIR:-./data}/models:/project/data/models
      - ${DATA_DIR:-./data}/renders:/project/data/renders
      - ${DATA_DIR:-./data}/logs:/project/data/logs
      - ${DATA_DIR:-./data}/db:/project/data/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
