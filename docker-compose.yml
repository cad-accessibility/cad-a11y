services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8635}:6969"
    env_file:
      - path: .env
        required: false
    environment:
      SERVER_VERBOSE: "${SERVER_VERBOSE:-0}"
    volumes:
      # Docker-managed named volumes (not host bind mounts). On first mount,
      # Docker seeds each volume from the image's /project/data/<name>, which
      # the Dockerfile already chowns to UID 48 (apache) before USER apache —
      # so the app can write immediately without relying on host/NFS
      # permissions being configured for UID 48.
      - models:/project/data/models
      - renders:/project/data/renders
      - logs:/project/data/logs
      - db:/project/data/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  models:
  renders:
  logs:
  db:
