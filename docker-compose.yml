services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8635}:6969"
    env_file:
      - path: .env
        required: false
    environment:
      SERVER_VERBOSE: "${SERVER_VERBOSE:-0}"
    volumes:
      # Bind mount so the container reads directly from the local data/models folder.
      - ./data/models:/project/data/models
      - renders:/project/data/renders
      - logs:/project/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  renders:
  logs:
