name: Mirror to GitLab

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITLAB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan gitlab.cs.washington.edu >> ~/.ssh/known_hosts

      - name: Push to GitLab
        run: |
          git remote add gitlab ${{ vars.GITLAB_REPO_URL }}
          git push gitlab HEAD:master --follow-tags
