name: Mirror to GitLab

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab "https://oauth2:${{ secrets.GITLAB_HTTPS_TOKEN }}@gitlab.cs.washington.edu/make4all/cad-a11y.git"
          git push gitlab HEAD:master --follow-tags
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            git push gitlab "$GITHUB_REF"
          fi
