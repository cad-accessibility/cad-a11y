name: Build Windows Installer

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          use-mamba: true
          channels: conda-forge
          channel-priority: strict
          auto-update-conda: true
          activate-environment: base

      - name: Install constructor
        shell: bash -l {0}
        run: |
          mamba install -n base -y constructor

      - name: Build Windows EXE installer
        shell: bash -l {0}
        run: |
          # NOTE: The installer/ directory was removed in a previous refactor.
          # To rebuild it, create installer/construct.yaml referencing:
          #   app/          (Python package — entry point: python -m app.server)
          #   data/models/  (bundled STL models — was model/)
          #   src/          (converter library)
          #   static/       (JS assets)
          #   accessible-3d-viewer.html
          constructor installer --output-dir dist installer
          ls -la dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: cad-a11y-windows-installer
          path: dist/*.exe

      - name: Upload installer to release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
