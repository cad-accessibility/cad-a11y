name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true

      - name: Lint (ruff high-signal)
        shell: bash
        run: |
          pixi run lint

      - name: Run tests
        shell: bash
        run: |
          pixi run test

  axe-accessibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true

      - name: Install axe dependencies
        shell: bash
        run: |
          pixi run test:a11y:install

      - name: Run axe check against home page
        shell: bash
        run: |
          pixi run a11y:local
