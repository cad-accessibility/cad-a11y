name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: cad-a11y
          cache-environment: true
          cache-downloads: true

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libhidapi-hidraw0 libhidapi-dev libgl1 libglib2.0-0 libxrender1

      - name: Install pip dependencies
        shell: bash -l {0}
        run: |
          grep -vE '^\s*(#|polyscope)' requirements.txt \
            | micromamba run -n cad-a11y pip install --no-cache-dir -r /dev/stdin
          micromamba run -n cad-a11y pip install --no-cache-dir polyscope || true
          micromamba run -n cad-a11y pip install --no-cache-dir pytest ruff

      - name: Lint (errors only)
        shell: bash -l {0}
        run: |
          micromamba run -n cad-a11y ruff check . --select E9,F63,F7,F82

      - name: Run tests
        shell: bash -l {0}
        run: |
          micromamba run -n cad-a11y pytest -q; code=$?; [ $code -eq 0 ] || [ $code -eq 5 ]

  axe-accessibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set data directory permissions for container user (UID 48)
        run: |
          mkdir -p data/db data/renders data/logs
          sudo chown -R 48:48 data/db data/renders data/logs

      - name: Start app with Docker Compose
        run: docker compose up -d --build

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8635/ >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          docker compose logs
          exit 1

      - name: Install axe dependencies
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install chromium

      - name: Run axe, console-error, and model-dropdown smoke test against viewer
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');
          const AxeBuilder = require('@axe-core/playwright').default;

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            const page = await context.newPage();

            // No hardware is attached in CI, so this also guards the "device not
            // connected" code paths (e.g. handlers wired up against elements or
            // functions that no longer exist) that only fail at runtime and are
            // invisible to node --check or the Python test suite.
            const consoleErrors = [];
            page.on('console', (msg) => {
              if (msg.type() === 'error') consoleErrors.push(msg.text());
            });
            page.on('pageerror', (err) => consoleErrors.push(err.message));

            await page.goto('http://localhost:8635/viewer', { waitUntil: 'domcontentloaded' });
            await page.waitForTimeout(2000);

            if (consoleErrors.length > 0) {
              console.error('Console/page errors found on /viewer:');
              for (const message of consoleErrors) {
                console.error(`- ${message}`);
              }
              await browser.close();
              process.exit(1);
            }

            // Regression guard for #102 ("No Models Available"): in Docker the
            // uploads dir and the built-in models dir are the same writable
            // directory, so the server sends builtin_model_stems: [] to mean
            // "show all". The client must treat that empty list as "show all",
            // not "allow nothing" ([] is truthy in JS). builtin_model_stems is
            // only delivered by the /get_data poll, so wait for that response
            // before reading the dropdown's steady state.
            await page.waitForResponse(
              (r) => r.url().includes('/get_data') && r.ok(),
              { timeout: 20000 }
            );
            await page.waitForTimeout(1000); // let applyServerState() apply it

            const modelDropdown = await page.evaluate(() => {
              const d = document.getElementById('model-list-dropdown');
              if (!d) return { found: false, disabled: true, realOptions: 0 };
              const realOptions = [...d.options].filter((o) => o.value !== '');
              return { found: true, disabled: d.disabled, realOptions: realOptions.length };
            });

            if (!modelDropdown.found || modelDropdown.disabled || modelDropdown.realOptions === 0) {
              console.error(
                'Model dropdown is empty after /get_data (regression of #102 — empty builtin_model_stems hid every model):',
                JSON.stringify(modelDropdown)
              );
              await browser.close();
              process.exit(1);
            }

            const results = await new AxeBuilder({ page }).analyze();
            const blocking = results.violations.filter((v) =>
              ['serious', 'critical'].includes(v.impact)
            );

            if (blocking.length > 0) {
              console.error('Axe found serious/critical violations:');
              for (const violation of blocking) {
                console.error(`- ${violation.id} (${violation.impact}): ${violation.help}`);
                for (const node of violation.nodes) {
                  console.error(`  target: ${node.target.join(', ')}`);
                }
              }
              await browser.close();
              process.exit(1);
            }

            console.log('Console-error, model-dropdown, and axe checks passed: no console errors, model list populated, no serious or critical a11y violations.');
            await browser.close();
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs
