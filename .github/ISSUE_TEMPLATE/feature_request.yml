name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues to see if it has already been discussed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you are running into. Who is affected and how?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility impact
      description: >
        How does this feature affect BLV users, screen reader users, or other users with disabilities?
        Write "No accessibility impact" if it does not apply.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered or tried?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots with alt text, references, related issues, or anything else helpful.
