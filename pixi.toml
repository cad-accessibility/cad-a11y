[workspace]
name = "cad-a11y"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = "3.9.*"
nodejs = "*"
pythonocc-core = "*"
numpy = "*"
scipy = "*"
matplotlib = "*"
networkx = "*"
shapely = "*"
trimesh = "*"
pillow = "*"
opencv = "*"
pytest = "*"
ruff = "*"
flask = "*"
flask-cors = "*"
svgwrite = "*"

[pypi-dependencies]
polyscope = "*"

[tasks]
start = "python app.py"
test = "pytest -q tests"
"test:py" = "pytest -q tests"
"test:all" = "pixi run test:py && pixi run a11y:local"
"test:a11y:install" = "npm ci && npx playwright install --with-deps chromium"
"test:a11y" = "npx playwright test --config=playwright.config.js"
"a11y:local" = "bash -c 'python app.py > app.log 2>&1 & APP_PID=$!; trap \"kill $APP_PID\" EXIT; for i in {1..30}; do curl -fsS http://127.0.0.1:5050/ >/dev/null && break; sleep 1; done; AXE_TARGET_URL=http://127.0.0.1:5050 npx playwright test --config=playwright.config.js'"
lint = "ruff check . --select E9,F63,F7,F82"
convert = "python src/converter/brep_to_svg.py"
