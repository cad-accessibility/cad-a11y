[project]
name = "cad-a11y"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = "3.9.*"
pythonocc-core = "*"
numpy = "*"
scipy = "*"
matplotlib = "*"
networkx = "*"
shapely = "*"
trimesh = "*"
pillow = "*"
opencv = "*"
pytest = "*"
ruff = "*"
flask = "*"
flask-cors = "*"
svgwrite = "*"

[pypi-dependencies]
polyscope = "*"

[tasks]
start = "python app.py"
test = "pytest -q"
lint = "ruff check . --select E9,F63,F7,F82"
convert = "python src/converter/brep_to_svg.py"
